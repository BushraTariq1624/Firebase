<!DOCTYPE html>
<html>

<head>
    <title>Slide Navbar</title>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main">
        <input type="checkbox" id="chk" aria-hidden="true">

        <div class="signup">
            <form>
                <label for="chk" aria-hidden="true">Sign up</label>
                <!-- <input type="text" name="txt" placeholder="User name"> -->
                <input type="email" id="email" name="email" placeholder="Email">
                <!-- <input type="number" name="broj" placeholder="BrojTelefona"> -->
                <input type="password" id="password" name="pswd" placeholder="Password">
                <button id="sign_up">Sign up</button>
            </form>
        </div>

        <div class="login">
            <form>
                <label for="chk" aria-hidden="true">Login</label>
                <input type="email" name="email" placeholder="Email" required="">
                <input type="password" name="pswd" placeholder="Password" required="">
                <button>Login</button>
            </form>
        </div>
    </div>
    <script type="module" src="firebase.mjs"></script>
    <script type="module" src="app.js"></script>
</body>

</html>
